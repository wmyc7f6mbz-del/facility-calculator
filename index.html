<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<meta name="theme-color"
      content="#1565C0">

<meta name="apple-mobile-web-app-capable"
      content="yes">

<meta name="apple-mobile-web-app-status-bar-style"
      content="default">

<meta name="apple-mobile-web-app-title"
      content="Facility Calculator">

<h1>Battery Runtime Calculator</h1>

<link rel="manifest"
      href="manifest.json">

<link rel="stylesheet"
      href="style.css">

</head>

<body>

<div class="container">

<header>

<div class="logo">

🔋

</div>

<h1>Battery Runtime Calculator</h1>
<div class="tabs">
<button class="tab-btn active" data-tab="battery">🔋 Battery</button>
<button class="tab-btn" data-tab="calculator">📐 Calculator</button>
</div>
</header>

<div id="batteryPage">
<!-- ========================= -->
<!-- 입력 카드 -->
<!-- ========================= -->

<section class="card">

<h2>입력값</h2>

<div class="input-group">

<label>

배터리 정격용량 (Ah)

<button
class="info-btn"
data-info="capacity">

ⓘ

</button>

</label>

<input
type="number"
id="capacity"
placeholder="예 : 200">

</div>

<div class="input-group">

<label>

가용용량 (%)

<button
class="info-btn"
data-info="efficiency">

ⓘ

</button>

</label>

<input
type="number"
id="efficiency"
placeholder="예 : 80">

</div>

<div class="input-group">

<label>

열화율 (%)

<button
class="info-btn"
data-info="aging">

ⓘ

</button>

</label>

<input
type="number"
id="aging"
placeholder="예 : 100">

</div>
<div class="input-group">

<label>

정류기 부하용량 (W)

<button
class="info-btn"
data-info="load">

ⓘ

</button>

</label>

<input
type="number"
id="load"
placeholder="예 : 410">

</div>

<div class="input-group">

<label>

과부하율 (%)

<button
class="info-btn"
data-info="reserve">

ⓘ

</button>

</label>

<input
type="number"
id="reserve"
placeholder="예 : 110">

</div>

<button id="calculateBtn">

계산하기

</button>

</section>

<!-- ========================= -->
<!-- 결과 -->
<!-- ========================= -->

<section class="card result-card">

<h2>계산 결과</h2>

<div id="result">

계산 버튼을 눌러주세요.

</div>

<button id="copyBtn">

📋 결과 복사

</button>

</section>

<!-- ========================= -->
<!-- 설정 -->
<!-- ========================= -->

<section class="card">

<div class="setting">

<span>🌙 다크모드</span>

<label class="switch">

<input
type="checkbox"
id="darkMode">

<span class="slider"></span>

</label>

</div>

</section>

<!-- ========================= -->
<!-- Smart Help -->
<!-- ========================= -->

<div
id="infoModal"
class="modal">

<div class="modal-content">

<h2 id="infoTitle">

</h2>

<div id="infoText">

</div>

<p class="notice">

본 설명은 일반적인 기준이므로 정확한 값이 아닐 수 있습니다.
업체 담당자와 조율하시기 바랍니다.

</p>

<button
id="closeInfo">

닫기

</button>

</div>

</div>
</div>

<div id="calculatorPage" style="display:none;">
<section class="card"><h2>📐 Engineering Calculator</h2><input type="text" id="calcDisplay" readonly placeholder="0"><div class="calculator"><button>AC</button><button>(</button><button>)</button><button>/</button><button>7</button><button>8</button><button>9</button><button>*</button><button>4</button><button>5</button><button>6</button><button>-</button><button>1</button><button>2</button><button>3</button><button>+</button><button>0</button><button>.</button><button>=</button><button>C</button><button>√</button><button>x²</button><button>π</button><button>%</button></div></section></div>

</div>

<script src="app.js"></script>

<script>

if ('serviceWorker' in navigator) {

    window.addEventListener('load', () => {

        navigator.serviceWorker.register('./sw.js')
            .then(registration => {

                console.log("✅ Service Worker 등록 완료");

                // 새 버전이 있으면 자동 갱신
                registration.update();

            })
            .catch(error => {

                console.log("❌ Service Worker 등록 실패", error);

            });

    });

}

</script>

</body>

</html>
