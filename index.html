<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Facility Calculator Pro</title>

    <meta name="theme-color" content="#2563EB">

    <link rel="manifest" href="manifest.json">

    <link rel="apple-touch-icon" href="icon-192.png">

    <meta name="apple-mobile-web-app-capable"
          content="yes">

    <meta name="apple-mobile-web-app-status-bar-style"
          content="default">

    <meta name="apple-mobile-web-app-title"
          content="Facility Calculator">

    <link rel="stylesheet"
          href="style.css">
</head>

<body>

<div class="container">

    <!-- 헤더 -->

    <header>

        <div class="logo">

            🔋

        </div>

        <h1>Facility Calculator Pro</h1>

        <p>UPS Battery Runtime Calculator</p>

    </header>



    <!-- 입력 카드 -->

    <section class="card">

        <h2>입력값</h2>

        <div class="input-group">

            <label>배터리 정격용량 (Ah)</label>

            <input
                type="number"
                id="capacity"
                placeholder="예 : 200">

        </div>

        <div class="input-group">

            <label>가용효율 (%)</label>

            <input
                type="number"
                id="efficiency"
                placeholder="예 : 80">

        </div>

        <div class="input-group">

            <label>열화계수 (%)</label>

            <input
                type="number"
                id="aging"
                placeholder="예 : 100">

        </div>

        <div class="input-group">

            <label>부하 (W)</label>

            <input
                type="number"
                id="load"
                placeholder="예 : 410">

        </div>

        <div class="input-group">

            <label>보수율 (%)</label>

            <input
                type="number"
                id="reserve"
                placeholder="예 : 110">

        </div>

        <button id="calculateBtn">

            계산하기

        </button>

    </section>



    <!-- 결과 -->

    <section class="card result-card">

        <h2>계산 결과</h2>

        <div id="result">

            계산 버튼을 눌러주세요.

        </div>

        <button id="copyBtn">

            📋 결과 복사

        </button>

    </section>



    <!-- 설정 -->

    <section class="card">

        <div class="setting">

            <span>🌙 다크모드</span>

            <label class="switch">

                <input type="checkbox"
                       id="darkMode">

                <span class="slider"></span>

            </label>

        </div>

    </section>

</div>



<script src="app.js"></script>

<script>

if ('serviceWorker' in navigator) {

    navigator.serviceWorker.register('./sw.js');

}

</script>

</body>
</html>
